apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siva-maya-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: siva-maya-backend
  template:
    metadata:
      labels:
        app: siva-maya-backend
    spec:
      containers:
      - name: backend
        image: nsbyadav14e/siva-maya-backend
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          value: mongodb://mongodb:27017/
---
apiVersion: v1
kind: Service
metadata:
  name: siva-maya-backend
spec:
  type: LoadBalancer
  selector:
    app: siva-maya-backend
  ports:
  - port: 5000
    targetPort: 5000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siva-maya-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: siva-maya-frontend
  template:
    metadata:
      labels:
        app: siva-maya-frontend
    spec:
      containers:
      - name: frontend
        image: nsbyadav14e/siva-maya-frontend
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: siva-maya-frontend
spec:
  type: LoadBalancer
  selector:
    app: siva-maya-frontend
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
      - name: mongo-express
        image: mongo-express:latest
        ports:
        - containerPort: 8081
        env:
        - name: ME_CONFIG_MONGODB_SERVER
          value: mongodb
        - name: ME_CONFIG_BASICAUTH_USERNAME
          value: admin
        - name: ME_CONFIG_BASICAUTH_PASSWORD
          value: admin123
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express
spec:
  type: LoadBalancer
  selector:
    app: mongo-express
  ports:
  - port: 8081
    targetPort: 8081
