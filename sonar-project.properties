# Required metadata
sonar.projectKey=my_python_web_app
sonar.projectName=My Python Web Application
sonar.projectVersion=1.0

# Path to source directories (comma-separated)
sonar.sources=.

# Source encoding
sonar.sourceEncoding=UTF-8

# Python specific settings
sonar.language=py

# Path to test source directories
sonar.tests=tests

# Exclude virtual environment and other build artifacts
sonar.exclusions=venv/**/*, .venv/**/*, env/**/*, .env/**/*, __pycache__/**/*, *.pyc

# (Optional) Path to test execution reports (e.g., from pytest)
# sonar.python.coverage.reportPaths=coverage.xml

# (Optional) Path to linting reports (e.g., from pylint or flake8)
# sonar.python.pylint.reportPath=pylint-report.txt
# sonar.python.flake8.reportPath=flake8-report.txt
