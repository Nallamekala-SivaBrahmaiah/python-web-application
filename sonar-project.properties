# SonarQube project identification
sonar.projectKey=python-web-app
sonar.projectName=Python Web Application
sonar.projectVersion=1.0

# Source code location
sonar.sources=.

# Test files location
sonar.tests=tests

# Python settings
sonar.language=py
sonar.python.version=3.11

# Exclude unnecessary files/folders
sonar.exclusions=**/venv/**, **/__pycache__/**, **/migrations/**, **/docs/**, **/*.md, **/*.txt

# Coverage report
sonar.python.coverage.reportPaths=coverage.xml

# File encoding
sonar.sourceEncoding=UTF-8
