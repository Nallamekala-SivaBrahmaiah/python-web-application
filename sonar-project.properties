# Required metadata
sonar.projectKey=python-web-app
sonar.projectName=Python Web Application
sonar.projectVersion=1.0

# Path to source code
sonar.sources=.

# Language
sonar.language=py

# Exclude test files (optional)
sonar.exclusions=**/tests/**

# Encoding of source files
sonar.sourceEncoding=UTF-8

# Coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Test report paths (optional, if you want test execution details)
sonar.python.xunit.reportPath=nosetests.xml
